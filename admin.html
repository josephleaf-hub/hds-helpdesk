<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Admin Dashboard — HDS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOADING STATE (shown until auth checked) -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">Checking authentication…</div>
</div>

<!-- MAIN APP (hidden until auth confirmed) -->
<div id="appShell" style="display:none;">
<main class="main">

  <!-- TOPBAR (transparent, per HDS dashboard system) -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="pageTitle">IT Admin Dashboard</div>
      <div class="topbar-meta" id="pageSubtitle">Loading…</div>
    </div>
    <div class="topbar-right">
      <div class="admin-user-pill">
        <span class="admin-role-dot" id="roleDot"></span>
        <span id="userLabel">Loading…</span>
      </div>
      <button class="btn-secondary" style="font-size:12px;" onclick="loadTickets()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;margin-right:4px;"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Refresh</button>
      <div class="logo-divider-line"></div>
      <img src="https://cdn.prod.website-files.com/69d48f8e8f01871806e7f5c4/69dc2749d52c90cf97e32309_Secondary-positive.png" alt="HDS" class="topbar-hds-logo" />
      <div class="logo-divider-line"></div>
      <button class="btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <!-- TAB BAR (admin has 2 tabs, manager has 1) -->
  <div class="tab-bar-wrap">
    <div class="tab-bar">
      <button class="tab-btn active" id="tabTicketsBtn" onclick="openTab('tickets', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;flex-shrink:0;margin-right:7px;"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 11v2"/><path d="M13 17v2"/></svg> All Tickets</button>
      <button class="tab-btn" id="tabOverviewBtn" onclick="openTab('overview', this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;flex-shrink:0;margin-right:7px;"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg> Overview</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="page-content">

    <!-- ══════════════════════════════
         TAB: ALL TICKETS
    ══════════════════════════════ -->
    <div id="tab-tickets" class="tab-pane active">

      <!-- KPI Cards -->
      <div class="kpi-wrap">
        <div class="kpi-grid" id="kpiGrid" style="grid-template-columns: repeat(5, 1fr);"></div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <span class="filter-lbl">Filter:</span>
        <input class="input" type="text" id="fSearch" placeholder="Search tickets…"
               onkeyup="applyFilters()" style="min-width:180px;" />
        <select class="input" id="fStatus" onchange="applyFilters()" style="width:130px;">
          <option value="">All Statuses</option>
          <option value="open">Open</option>
          <option value="in-progress">In Progress</option>
          <option value="waiting-on-admin">Waiting on Admin</option>
          <option value="waiting-on-requester">Waiting on Requester</option>
          <option value="on-hold">On Hold</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <select class="input" id="fCat" onchange="applyFilters()" style="width:150px;">
          <option value="">All Categories</option>
          <option value="access">Access Request</option>
          <option value="hardware">Hardware</option>
          <option value="account">Account Setup</option>
          <option value="support">IT Support</option>
        </select>
        <select class="input" id="fPri" onchange="applyFilters()" style="width:115px;">
          <option value="">All Priorities</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="input" id="fAssign" onchange="applyFilters()" style="width:150px;" id="fDept">
          <option value="">All Assignees</option>
          <option value="__unassigned__">Unassigned</option>
          <option value="IT Level 1">IT Level 1</option>
          <option value="IT Level 2">IT Level 2</option>
          <option value="Senior Engineer">Senior Engineer</option>
          <option value="IT Manager">IT Manager</option>
        </select>
        <button class="btn-ghost" onclick="clearFilters()" style="font-size:12px;">Clear</button>
      </div>

      <div class="section-title" style="margin-top:0;">
        Tickets
        <span class="section-badge" id="ticketCount">0</span>
      </div>

      <div class="table-card">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>Subject</th>
                <th>Category</th>
                <th>Requester</th>
                <th>Department</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assigned To</th>
                <th>Submitted</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ticketTbody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /tab-tickets -->

    <!-- ══════════════════════════════
         TAB: OVERVIEW (admin only)
    ══════════════════════════════ -->
    <div id="tab-overview" class="tab-pane">

      <div id="overviewContent">
        <div class="overview-row">
          <!-- By Status -->
          <div class="overview-card">
            <div class="overview-card-title">Tickets by Status</div>
            <div id="statusChart"></div>
          </div>
          <!-- By Category -->
          <div class="overview-card">
            <div class="overview-card-title">Tickets by Category</div>
            <div id="catChart"></div>
          </div>
        </div>
        <div class="overview-row">
          <!-- By Department -->
          <div class="overview-card">
            <div class="overview-card-title">Tickets by Department</div>
            <div id="deptChart"></div>
          </div>
          <!-- By Priority -->
          <div class="overview-card">
            <div class="overview-card-title">Tickets by Priority</div>
            <div id="priChart"></div>
          </div>
        </div>
      </div>

    </div><!-- /tab-overview -->

  </div><!-- /page-content -->
</main>
</div><!-- /appShell -->

<!-- ══════════════════════════════
     EDIT TICKET MODAL
══════════════════════════════ -->
<div class="modal-overlay" id="editModal" onclick="closeEditIfOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="emTitle"></div>
        <div class="modal-ticket-id" id="emMeta"></div>
      </div>
      <button class="modal-close" onclick="closeEdit()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="emBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEdit()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Credentials live in config.js — edit that one file only -->
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
// CAT_LABEL, STATUS_LABEL, PRI_LABEL, IT_TEAM, DEPARTMENTS now live in shared.js
const STATUS_ORDER = { open:0,'in-progress':1,'waiting-on-admin':2,'waiting-on-requester':3,'on-hold':4,resolved:5,closed:6 };
const PRI_ORDER    = { urgent:0,high:1,medium:2,low:3 };

const sb = createHdsClient();

let currentUser   = null;  // { id, email, role, department, full_name }
let allTickets    = [];    // raw from Supabase
let filtered      = [];    // after filters applied
let activeTicketId = null;
let currentComposerTab = 'reply';   // which composer tab is active: reply | internal | log
let adminPendingFiles = [];
const ADMIN_PAPERCLIP = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';

// ─────────────────────────────────────────────
// AUTH CHECK — runs on page load
// ─────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    window.location.href = '/login.html';
    return;
  }

  const { data: role, error } = await sb
    .from('user_roles')
    .select('role, department, full_name')
    .eq('user_id', session.user.id)
    .single();

  if (error || !role) {
    await sb.auth.signOut();
    window.location.href = '/login.html';
    return;
  }

  currentUser = { id: session.user.id, email: session.user.email, ...role };

  // Update UI for role
  const isAdmin = currentUser.role === 'admin';
  document.getElementById('userLabel').textContent =
    `${currentUser.full_name} · ${isAdmin ? 'IT Admin' : 'Manager'}`;
  document.getElementById('roleDot').className =
    'admin-role-dot' + (isAdmin ? '' : ' mgr');

  if (isAdmin) {
    document.getElementById('pageTitle').textContent = 'IT Admin Dashboard';
    document.getElementById('pageSubtitle').textContent = 'All tickets across the business';
    document.getElementById('tabOverviewBtn').style.display = '';
  } else {
    document.getElementById('pageTitle').textContent = `${currentUser.department} — My Team's Tickets`;
    document.getElementById('pageSubtitle').textContent = `Manager view — ${currentUser.department} department`;
    document.getElementById('tabOverviewBtn').style.display = 'none';
    document.querySelector('.tab-btn.active').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;flex-shrink:0;margin-right:7px;"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> My Team\'s Tickets';
  }

  // Show app
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';

  await loadTickets();
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = '/login.html';
}

// ─────────────────────────────────────────────
// DATA LOADING
// ─────────────────────────────────────────────
async function loadTickets() {
  document.getElementById('ticketTbody').innerHTML =
    '<tr><td colspan="10" style="text-align:center;padding:32px;"><div class="spinner" style="margin:0 auto;width:24px;height:24px;border-width:2px;"></div></td></tr>';

  let q = sb
    .from('tickets')
    .select('*, ticket_notes(id, added_by, note_text, note_type, created_at)')
    .order('created_at', { ascending: false });

  // Managers only see their dept
  if (currentUser.role === 'manager' && currentUser.department) {
    q = q.eq('department', currentUser.department);
  }

  const { data, error } = await q;

  if (error) {
    showToast('Failed to load tickets: ' + error.message);
    return;
  }

  allTickets = data || [];
  applyFilters();
  renderKPIs();
  if (document.getElementById('tab-overview').classList.contains('active')) {
    renderOverview();
  }
}

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
function applyFilters() {
  const search  = (document.getElementById('fSearch')?.value  || '').toLowerCase();
  const fStatus = document.getElementById('fStatus')?.value  || '';
  const fCat    = document.getElementById('fCat')?.value     || '';
  const fPri    = document.getElementById('fPri')?.value     || '';
  const fAssign = document.getElementById('fAssign')?.value  || '';

  filtered = allTickets.filter(t => {
    if (search && !`${t.id} ${t.subject} ${t.requester_name} ${t.department} ${t.sub_type}`.toLowerCase().includes(search)) return false;
    if (fStatus && t.status !== fStatus)       return false;
    if (fCat    && t.category !== fCat)        return false;
    if (fPri    && t.priority !== fPri)        return false;
    if (fAssign === '__unassigned__' && t.assigned_to)  return false;
    if (fAssign && fAssign !== '__unassigned__' && t.assigned_to !== fAssign) return false;
    return true;
  }).sort((a, b) => {
    const sd = STATUS_ORDER[a.status] - STATUS_ORDER[b.status];
    if (sd !== 0) return sd;
    const pd = PRI_ORDER[a.priority] - PRI_ORDER[b.priority];
    if (pd !== 0) return pd;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  renderTable();
}

function clearFilters() {
  ['fSearch','fStatus','fCat','fPri','fAssign'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  applyFilters();
}

// ─────────────────────────────────────────────
// RENDER: KPI CARDS
// ─────────────────────────────────────────────
function renderKPIs() {
  const open    = allTickets.filter(t => t.status === 'open').length;
  const prog    = allTickets.filter(t => t.status === 'in-progress').length;
  const hold    = allTickets.filter(t => t.status === 'on-hold').length;
  const hiUrg   = allTickets.filter(t => ['urgent','high'].includes(t.priority) && ['open','in-progress'].includes(t.status)).length;
  const done    = allTickets.filter(t => ['resolved','closed'].includes(t.status)).length;

  const g = document.getElementById('kpiGrid');
  g.innerHTML = `
    <div class="kpi-card hds">
      <div class="kpi-lbl">Open</div><div class="kpi-val">${open}</div>
      <div class="kpi-sub">Awaiting action</div>
    </div>
    <div class="kpi-card wrn">
      <div class="kpi-lbl">In Progress</div><div class="kpi-val">${prog}</div>
      <div class="kpi-sub">Being worked on</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">On Hold</div><div class="kpi-val" style="color:#4A5568;">${hold}</div>
      <div class="kpi-sub">Awaiting info</div>
    </div>
    <div class="kpi-card err">
      <div class="kpi-lbl">High / Urgent</div><div class="kpi-val">${hiUrg}</div>
      <div class="kpi-sub">Active escalations</div>
    </div>
    <div class="kpi-card grn">
      <div class="kpi-lbl">Resolved</div><div class="kpi-val">${done}</div>
      <div class="kpi-sub">All time</div>
    </div>`;
}

// ─────────────────────────────────────────────
// RENDER: TICKET TABLE
// ─────────────────────────────────────────────
function renderTable() {
  document.getElementById('ticketCount').textContent = filtered.length;
  const tbody = document.getElementById('ticketTbody');

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#6B7280;">No tickets match your filters.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(t => `
    <tr onclick="openEdit('${t.id}')">
      <td>${esc(t.id)}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(t.subject)}</td>
      <td>${esc(CAT_LABEL[t.category] || t.category)}</td>
      <td>${esc(t.requester_name)}</td>
      <td>${esc(t.department)}</td>
      <td>${priBadge(t.priority)}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.assigned_to ? esc(t.assigned_to) : '<span style="color:#9CA3AF;font-style:italic;">Unassigned</span>'}</td>
      <td>${fmtShort(t.created_at)}</td>
      <td onclick="event.stopPropagation()">
        <button class="tbl-action" onclick="openEdit('${t.id}')">Edit</button>
      </td>
    </tr>`).join('');
}

// ─────────────────────────────────────────────
// RENDER: OVERVIEW CHARTS (mini bar charts)
// ─────────────────────────────────────────────
function renderOverview() {
  const total = allTickets.length || 1;

  // Status breakdown
  const statuses = ['open','in-progress','on-hold','resolved','closed'];
  document.getElementById('statusChart').innerHTML = statuses.map(s => {
    const n = allTickets.filter(t => t.status === s).length;
    return miniBar(STATUS_LABEL[s], n, total, s === 'open' ? '' : s === 'resolved' ? 'green' : s === 'on-hold' ? 'orange' : '');
  }).join('');

  // Category breakdown
  const cats = ['access','hardware','account','support'];
  document.getElementById('catChart').innerHTML = cats.map(c => {
    const n = allTickets.filter(t => t.category === c).length;
    return miniBar(CAT_LABEL[c], n, total, '');
  }).join('');

  // Department breakdown
  const depts = [...new Set(allTickets.map(t => t.department))].sort();
  document.getElementById('deptChart').innerHTML = depts.map(d => {
    const n = allTickets.filter(t => t.department === d).length;
    return miniBar(d, n, total, 'orange');
  }).join('') || '<div class="empty-text">No data</div>';

  // Priority breakdown
  const pris = ['urgent','high','medium','low'];
  document.getElementById('priChart').innerHTML = pris.map(p => {
    const n = allTickets.filter(t => t.priority === p).length;
    const col = p==='urgent'?'':'';
    return miniBar(PRI_LABEL[p], n, total, p==='urgent'?'orange':p==='high'?'orange':p==='low'?'grey':'');
  }).join('');
}

function miniBar(label, count, total, color) {
  const pct = Math.max(2, Math.round((count / total) * 100));
  return `<div class="mini-bar-row">
    <div class="mini-bar-label">${esc(label)}</div>
    <div class="mini-bar-track"><div class="mini-bar-fill ${color}" style="width:${pct}%;"></div></div>
    <div class="mini-bar-count">${count}</div>
  </div>`;
}

// ─────────────────────────────────────────────
// EDIT MODAL
// ─────────────────────────────────────────────
async function openEdit(id) {
  const t = allTickets.find(x => x.id === id);
  if (!t) return;
  activeTicketId = id;
  currentComposerTab = 'reply';
  adminPendingFiles = [];
  const reqFirst = esc((t.requester_name || '').split(' ')[0] || 'requester');

  document.getElementById('emTitle').textContent    = t.subject;
  document.getElementById('emMeta').textContent     =
    `${t.id} · ${CAT_LABEL[t.category]||t.category} — ${t.sub_type} · Submitted ${fmtDate(t.created_at)}`;

  const notes = (t.ticket_notes || []).sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  const attMap = await loadAttachmentMap(sb, id);
  const notesHtml = renderConversation(notes, reqFirst, attMap);

  const firstName = reqFirst;
  const chev   = '<svg class="chev ico" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
  const stCls  = ({open:'b-open','in-progress':'b-progress','waiting-on-requester':'b-waiting','on-hold':'b-hold',resolved:'b-resolved',closed:'b-closed'})[t.status] || 'b-hold';
  const prCls  = ({low:'b-low',medium:'b-medium',high:'b-high',urgent:'b-urgent'})[t.priority] || 'b-low';
  const sendIco = '<svg class="ico" width="13" height="13" viewBox="0 0 24 24"><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  const intIco  = '<svg class="ico" width="13" height="13" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  const logIco  = '<svg class="ico" width="13" height="13" viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>';

  document.getElementById('emBody').innerHTML = `
    <div class="h-body">

      <!-- LEFT: read-only ticket context -->
      <div class="h-left">
        <div class="field">
          <div class="field-label">Requester</div>
          <div class="field-val">${esc(t.requester_name)}</div>
          <div class="field-sub">${esc(t.requester_email)}</div>
        </div>
        <div class="field">
          <div class="field-label">Department / Location</div>
          <div class="field-val">${esc(t.department)}${t.location ? ' · ' + esc(t.location) : ''}</div>
        </div>

        <hr class="divider-line">

        <div class="field">
          <div class="field-label">Description</div>
          <div class="desc-block">${esc(t.description)}</div>
        </div>

        <hr class="divider-line">

        <div class="field"${(!t.affected_user && !t.resolved_at) ? ' style="margin-bottom:0;"' : ''}>
          <div class="field-label">Submitted</div>
          <div class="field-val">${fmtDate(t.created_at)}</div>
        </div>
        ${t.affected_user ? `
        <div class="field"${!t.resolved_at ? ' style="margin-bottom:0;"' : ''}>
          <div class="field-label">Affected user</div>
          <div class="field-val">${esc(t.affected_user)}</div>
        </div>` : ''}
        ${t.resolved_at ? `
        <div class="field" style="margin-bottom:0;">
          <div class="field-label">Resolved at</div>
          <div class="field-val">${fmtDate(t.resolved_at)}</div>
        </div>` : ''}
      </div>

      <!-- RIGHT: pills + conversation + sticky composer -->
      <div class="h-right">

        <!-- Pills strip -->
        <div class="pills-strip">
          <span class="pill-label">Status</span>
          <button class="pill ${stCls}" onclick="openPillMenu('status', this)">${STATUS_LABEL[t.status]||t.status}${chev}</button>
          <span class="pill-label" style="margin-left:8px;">Priority</span>
          <button class="pill ${prCls}" onclick="openPillMenu('priority', this)">${PRI_LABEL[t.priority]||t.priority}${chev}</button>
          <span class="pill-label" style="margin-left:8px;">Assigned</span>
          ${t.assigned_to
            ? `<button class="pill b-hold" onclick="openPillMenu('assigned', this)">${esc(t.assigned_to)}${chev}</button>`
            : `<button class="pill p-unassigned" onclick="openPillMenu('assigned', this)">Unassigned${chev}</button>`}
        </div>

        <!-- Conversation scroll area -->
        <div class="conv-scroll" id="emConvScroll">
          ${notesHtml}
        </div>

        <!-- Sticky composer -->
        <div class="composer">
          <div class="compose-tabs">
            <button class="compose-tab tab-reply active" data-tab="reply" onclick="setComposerTab('reply')">${sendIco} Reply to ${firstName}</button>
            <button class="compose-tab tab-internal" data-tab="internal" onclick="setComposerTab('internal')">${intIco} Internal note</button>
            <button class="compose-tab tab-log" data-tab="log" onclick="setComposerTab('log')">${logIco} Log their email reply</button>
          </div>
          <div class="compose-meta" id="emComposeMeta">
            Email sent from <strong>helpdesk@homedelivery.com.au</strong> to <strong>${esc(t.requester_email)}</strong> · they can reply directly to it
          </div>
          <textarea id="emComposeText" placeholder="Type your reply to ${firstName}…"></textarea>
          <div id="emAttachPreview" class="attach-preview"></div>
          <div class="compose-actions">
            <div class="status-radio-row">
              <span class="label-strong">Status:</span>
              <label><input type="radio" name="emComposeStatus" value="" checked> No change</label>
              <label><input type="radio" name="emComposeStatus" value="waiting-on-requester"> On requester</label>
              <label><input type="radio" name="emComposeStatus" value="waiting-on-admin"> On me</label>
              <label><input type="radio" name="emComposeStatus" value="in-progress"> In progress</label>
              <label><input type="radio" name="emComposeStatus" value="resolved"> Resolved</label>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <button type="button" class="btn-ghost attach-btn" onclick="document.getElementById('emFileInput').click()">${ADMIN_PAPERCLIP} Attach</button>
              <button class="btn btn-send" id="emComposeBtn" onclick="submitComposer()">Send Email Reply ${sendIco}</button>
            </div>
          </div>
          <input type="file" id="emFileInput" accept="image/*" multiple style="display:none" onchange="handleAdminFiles(this.files)">
        </div>

      </div>
    </div>`;

  document.getElementById('editModal').classList.add('open');

  // Auto-scroll the conversation to the latest message
  const conv = document.getElementById('emConvScroll');
  if (conv) conv.scrollTop = conv.scrollHeight;
}

// ─────────────────────────────────────────────
// COMPOSER (tabbed: reply / internal note / log inbound)
// ─────────────────────────────────────────────
const COMPOSE_SEND_ICO = '<svg class="ico" width="13" height="13" viewBox="0 0 24 24"><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>';

function setComposerTab(tab) {
  currentComposerTab = tab;
  const t = allTickets.find(x => x.id === activeTicketId);
  const firstName = t ? esc((t.requester_name || '').split(' ')[0] || 'requester') : 'requester';
  const email     = t ? esc(t.requester_email) : '';

  document.querySelectorAll('.compose-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));

  const meta = document.getElementById('emComposeMeta');
  const btn  = document.getElementById('emComposeBtn');
  const ta   = document.getElementById('emComposeText');
  if (!meta || !btn) return;

  if (tab === 'internal') {
    meta.innerHTML = 'Visible to IT team only — does not email the requester';
    btn.className  = 'btn btn-internal';
    btn.innerHTML  = 'Add Internal Note';
    if (ta) ta.placeholder = 'Add an internal note (IT team only)…';
  } else if (tab === 'log') {
    meta.innerHTML = 'Logging a reply that came via email — no email will be sent';
    btn.className  = 'btn btn-send';
    btn.innerHTML  = 'Log Reply';
    if (ta) ta.placeholder = `Paste ${firstName}'s emailed reply…`;
  } else { // reply
    meta.innerHTML = `Email sent from <strong>helpdesk@homedelivery.com.au</strong> to <strong>${email}</strong> · they can reply directly to it`;
    btn.className  = 'btn btn-send';
    btn.innerHTML  = `Send Email Reply ${COMPOSE_SEND_ICO}`;
    if (ta) ta.placeholder = `Type your reply to ${firstName}…`;
  }
  btn.disabled = false;
  if (ta) ta.focus();
}

async function submitComposer() {
  const ta   = document.getElementById('emComposeText');
  const text = ((ta && ta.value) || '').trim();
  if (!text && !adminPendingFiles.length) { showToast('Type something or attach an image first.'); return; }
  const radio     = document.querySelector('input[name="emComposeStatus"]:checked');
  const newStatus = radio && radio.value ? radio.value : null;
  const tab       = currentComposerTab;

  let attachmentIds = [];
  try {
    attachmentIds = await uploadImages(sb, activeTicketId, adminPendingFiles);
  } catch (err) { showToast('Upload failed: ' + err.message); return; }
  adminPendingFiles = [];

  if (tab === 'reply')         await sendReply('outbound', text, newStatus, attachmentIds);
  else if (tab === 'log')      await sendReply('inbound',  text, newStatus, attachmentIds);
  else if (tab === 'internal') await addInternalNote(text, newStatus, attachmentIds);

  // The success paths re-render the modal (which resets to the Reply tab);
  // restore whichever tab the user was working in.
  setComposerTab(tab);
}

// ── Composer image attachments (admin) ──
function handleAdminFiles(fileList) {
  for (const f of fileList) {
    if (adminPendingFiles.length >= 3) { showToast('You can attach up to 3 images.'); break; }
    if (!f.type.startsWith('image/')) { showToast('Images only.'); continue; }
    if (f.size > 2 * 1024 * 1024) { showToast(`"${f.name}" is over the 2 MB limit.`); continue; }
    adminPendingFiles.push(f);
  }
  const input = document.getElementById('emFileInput');
  if (input) input.value = '';
  renderAdminAttachPreview();
}
function removeAdminFile(i) { adminPendingFiles.splice(i, 1); renderAdminAttachPreview(); }
function renderAdminAttachPreview() {
  const el = document.getElementById('emAttachPreview');
  if (!el) return;
  el.innerHTML = adminPendingFiles.map((f, i) =>
    `<span class="attach-chip"><span>${esc(f.name)}</span><button type="button" onclick="removeAdminFile(${i})" aria-label="Remove">×</button></span>`
  ).join('');
}

async function addInternalNote(text, newStatus, attachmentIds) {
  const msg = (text || '').trim();
  const atts = attachmentIds || [];
  if (!msg && !atts.length) { showToast('Type a note or attach an image first.'); return; }

  const btn  = document.getElementById('emComposeBtn');
  const orig = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }

  try {
    const { data: noteRow, error: noteErr } = await sb.from('ticket_notes').insert({
      ticket_id: activeTicketId,
      added_by:  currentUser.full_name || currentUser.email,
      note_text: msg,
      note_type: 'internal',
    }).select('id').single();
    if (noteErr) throw noteErr;

    if (atts.length) {
      await sb.from('ticket_attachments').update({ note_id: noteRow.id })
        .eq('ticket_id', activeTicketId).is('note_id', null).in('id', atts);
    }

    if (newStatus) {
      const update = { status: newStatus };
      if (newStatus === 'resolved' || newStatus === 'closed') update.resolved_at = new Date().toISOString();
      const { error: tErr } = await sb.from('tickets').update(update).eq('id', activeTicketId);
      if (tErr) throw tErr;
    }

    showToast('Internal note added');
    await loadTickets();
    await openEdit(activeTicketId);
  } catch (err) {
    showToast('Failed: ' + err.message);
    if (btn) { btn.disabled = false; btn.innerHTML = orig; }
  }
}

// ─────────────────────────────────────────────
// PILLS — inline status / priority / assignee (save instantly)
// ─────────────────────────────────────────────
function openPillMenu(field, anchorEl) {
  closePillMenu();
  const t = allTickets.find(x => x.id === activeTicketId);
  if (!t) return;

  let options;
  if (field === 'status')        options = Object.entries(STATUS_LABEL).map(([v,l]) => ({ value:v, label:l }));
  else if (field === 'priority') options = Object.entries(PRI_LABEL).map(([v,l]) => ({ value:v, label:l }));
  else if (field === 'assigned') options = [{ value:'', label:'Unassigned' }, ...IT_TEAM.map(m => ({ value:m, label:m }))];
  else return;

  const current = field === 'assigned' ? (t.assigned_to || '') : t[field];
  const menu = document.createElement('div');
  menu.className = 'pill-menu';
  menu.id = 'pillMenu';
  menu.innerHTML = options.map(o => {
    const v = String(o.value).replace(/'/g, "\\'");
    return `<button class="${o.value === current ? 'selected' : ''}" onclick="updateTicketField('${field}', '${v}')">${esc(o.label)}</button>`;
  }).join('');

  const rect = anchorEl.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 6) + 'px';
  menu.style.left = rect.left + 'px';
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener('click', pillOutsideClose), 0);
}

function pillOutsideClose(e) {
  const menu = document.getElementById('pillMenu');
  if (menu && !menu.contains(e.target) && !e.target.closest('.pill')) closePillMenu();
}

function closePillMenu() {
  const menu = document.getElementById('pillMenu');
  if (menu) menu.remove();
  document.removeEventListener('click', pillOutsideClose);
}

async function updateTicketField(field, value) {
  closePillMenu();
  try {
    const column = field === 'assigned' ? 'assigned_to' : field;
    const val    = field === 'assigned' ? (value || null) : value;
    const update = { [column]: val };
    if (field === 'status' && (value === 'resolved' || value === 'closed')) {
      update.resolved_at = new Date().toISOString();
    }
    const { error } = await sb.from('tickets').update(update).eq('id', activeTicketId);
    if (error) throw error;

    const labels = { status:'Status', priority:'Priority', assigned:'Assignee' };
    showToast(`${labels[field] || field} updated`);
    await loadTickets();
    await openEdit(activeTicketId);
  } catch (err) {
    showToast('Failed: ' + err.message);
  }
}

function closeEdit() {
  closePillMenu();
  document.getElementById('editModal').classList.remove('open');
  activeTicketId = null;
}
function closeEditIfOutside(e) { if (e.target.id === 'editModal') closeEdit(); }

// ─────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────
function openTab(name, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  window.scrollTo(0, 0);
  if (name === 'overview') renderOverview();
}

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
// esc() now lives in shared.js
// ─────────────────────────────────────────────
// REPLY TO REQUESTER (outbound) or LOG REPLY (inbound)
// ─────────────────────────────────────────────
async function sendReply(direction, text, newStatus, attachmentIds) {
  const msg = (text || '').trim();
  const atts = attachmentIds || [];
  if (!msg && !atts.length) {
    showToast(direction === 'outbound' ? 'Type a reply first.' : 'Paste the requester\'s reply first.');
    return;
  }

  const btn  = document.getElementById('emComposeBtn');
  const orig = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.textContent = direction === 'outbound' ? 'Sending…' : 'Logging…'; }

  try {
    const { data: sessionData } = await sb.auth.getSession();
    const token = sessionData?.session?.access_token;
    if (!token) throw new Error('Session expired — please sign in again.');

    const res = await fetch('/api/send-message', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({
        ticketId: activeTicketId,
        message: msg,
        direction,
        newStatus,
        attachmentIds: atts,
      }),
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(result.error || ('HTTP ' + res.status));

    showToast(direction === 'outbound' ? 'Reply sent to requester.' : 'Reply logged against ticket.');
    // Refresh ticket data and reopen modal in place
    await loadTickets();
    await openEdit(activeTicketId);
  } catch (err) {
    showToast('Failed: ' + err.message);
    if (btn) { btn.disabled = false; btn.innerHTML = orig; }
  }
}

// fmtDate(), fmtShort(), statusBadge(), priBadge(), showToast() now live in shared.js

// BOOTSTRAP
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEdit(); });
init();
