[build]
  publish  = "."
  functions = "netlify/functions"
  command  = "node generate-config.js"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/login"
  to     = "/login.html"
  status = 200

[[redirects]]
  from   = "/admin/analytics"
  to     = "/analytics.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# Portable token sign-in: /p/{token}/... → server-side redeem → magic-link redirect
[[redirects]]
  from   = "/p/*"
  to     = "/.netlify/functions/redeem-token/:splat"
  status = 200

# Direct ticket links (/t/HDS-NNNN) are handled client-side by the portal
[[redirects]]
  from   = "/t/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"